name: Build Angular on Tag

on:
  push:
    tags:
      - 'v*' # hanya trigger jika tag mulai dengan "v"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '16'

    - name: Install Dependencies
      run: npm install

    - name: Build Angular App
      run: |
        node --max-old-space-size=4096 ./node_modules/@angular/cli/bin/ng build --prod --base-href=/plantation-erp/

    - name: Upload dist as Release Asset
      uses: softprops/action-gh-release@v2
      with:
        name: "Release ${{ github.ref_name }}"
        tag_name: ${{ github.ref_name }}
        files: |
          dist/**/*

      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
