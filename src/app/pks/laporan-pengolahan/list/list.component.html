<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <!-- <div class="col-md-8 col-md-offset-2"> -->
      <!-- <h3 class="title text-center">Kelas Mapel</h3> -->
      <!-- <br /> -->
      <div class="col-md-12">
        <div class="card">
          <div class="card-header">
            <h4 class="card-title">Laporan -
              <small class="category">Stok Produk</small>
            </h4>
          </div>
          <div class="card-content">
            <div class="row">
              <div class="col-md-2">
                <ul class="nav nav-pills nav-pills-icons nav-pills-warning nav-stacked" role="tablist">

                  <!-- <li>
                    <a href="#laporan_produksi_harian" role="tab" data-toggle="tab">
                      <i class="material-icons">person</i>Stok Produk
                    </a>
                  </li> -->
                  <li class="active">
                    <a href="#laporan_pengolahan" role="tab" data-toggle="tab">
                      <i class="material-icons">list</i>Pengolahan
                    </a>
                  </li>

                </ul>
              </div>
              <div class="col-md-8">
                <div class="tab-content">


                  <div class="tab-pane " id="laporan_produksi_harian">
                    <form [formGroup]="ProduksiForm" (ngSubmit)="reportProduksi()">
                      <div class="card">
                        <div class="card-header">
                          <h4 class="card-title">Rekap Harian</h4>
                        </div>
                        <div class="card-content">


                          <div class="form-group label-floating">
                            <label class="control-label">Lokasi</label>
                            <l-select2 [data]="dataSelectOrganisasi" formControlName="lokasi" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'50%'}">
                            </l-select2>
                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal">
                            </mat-form-field>
                          </div>

                          <div class="form-group">
                            <button type="submit" class="btn btn-primary btn-sm btn-rose">Tampilkan</button>
                          </div>

                        </div>
                      </div>
                    </form>
                  </div>






                  <div class="tab-pane active " id="laporan_pengolahan">
                    <form [formGroup]="LaporanPengolahanForm" (ngSubmit)="reportLaporanPengolahan('view')">
                      <div class="card">
                        <div class="card-header">
                          <h4 class="card-title">Pengolahan</h4>
                        </div>
                        <div class="card-content">


                          <div class="form-group label-floating">
                            <label class="control-label">Lokasi</label>
                            <l-select2 [data]="dataSelectOrganisasi" formControlName="lokasi" [options]="{ placeholder: 'Pilih',
                        allowClear: false,width:'50%'}">
                            </l-select2>
                          </div>
                          <!-- <div class="form-group label-floating">
                            <label class="control-label">Produk</label>
                            <l-select2 [data]="dataSelectProduk" formControlName="produk" [options]="{ placeholder: 'pilih',
                        allowClear: false,width:'50%'}">
                            </l-select2>
                          </div> -->
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>dari Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_mulai">
                            </mat-form-field>
                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>s/d Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_akhir">
                            </mat-form-field>
                          </div>

                          <div class="form-group">
                            <button type="submit" class="btn btn-primary btn-sm btn-rose">Tampilkan</button>
                            <button type="button" class="btn btn-primary btn-sm btn-rose"
                              (click)="reportLaporanPengolahan('excel')">Excel</button>
                              <button type="button" class="btn btn-primary btn-sm btn-rose"
                              (click)="reportLaporanPengolahan('pdf')">PDF</button>
                          </div>

                        </div>
                      </div>
                    </form>
                  </div>





                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- </div> -->
    </div>
  </div>
</div>
