<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <!-- <div class="col-md-8 col-md-offset-2"> -->
      <!-- <h3 class="title text-center">Kelas Mapel</h3> -->
      <!-- <br /> -->
      <div class="col-md-12">
        <div class="card">
          <div class="card-header">
            <h4 class="card-title">Laporan -
              <small class="category">Maintenance Mesin Mill</small>
            </h4>
          </div>
          <div class="card-content">
            <div class="row">
              <div class="col-md-2">
                <ul class="nav nav-pills nav-pills-icons nav-pills-success nav-stacked" role="tablist">
                  <!--
                  color-classes: "nav-pills-primary", "nav-pills-info", "nav-pills-success", "nav-pills-warning","nav-pills-danger"
              -->
                  <!-- <li class="active"> -->

                    <li class="active">
                      <a href="#laporan_maintenance_rutin" role="tab" data-toggle="tab">
                        <i class="material-icons">business</i>Maintenance Rutin
                      </a>
                    </li>
                  <li class="">
                    <a href="#laporan_detail" role="tab" data-toggle="tab">
                      <i class="material-icons">business</i>Detail
                    </a>
                  </li>

                  <!-- <li class="">
                    <a href="#laporan_by_mesin" role="tab" data-toggle="tab">
                      <i class="material-icons">business</i>By Mesin
                    </a>
                  </li> -->


                </ul>
              </div>
              <div class="col-md-8">
                <div class="tab-content">


                  <div class="tab-pane " id="laporan_detail">
                    <form [formGroup]="laporanDetailCostForm" (ngSubmit)="reportDetail()">
                      <div class="card">
                        <div class="card-header">
                          <h4 class="card-title">Detail </h4>
                        </div>
                        <div class="card-content">

                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>dari Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_mulai">
                            </mat-form-field>

                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>s/d Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_akhir">
                            </mat-form-field>

                          </div>
                          <div class="form-group label-floating">
                            <label class="control-label">Mill</label>

                            <l-select2 [data]="dataSelectMill" formControlName="mill" [options]="{ placeholder: 'Pilih',
                        allowClear: false,width:'50%'}">
                            </l-select2>
                            <div *ngIf="isFormSubmitted && laporanDetailCostForm.controls['mill'].errors"
                              class="invalid-feedback">
                              <small [hidden]="!laporanDetailCostForm.controls['mill'].errors.required" class="text-danger">
                                Tidak boleh kosong!
                              </small>
                            </div>

                          </div>

                          <!-- <div class="form-group label-floating">
                            <label class="control-label">stasiun</label>

                            <l-select2 [data]="dataSelectStasiun" formControlName="stasiun" [options]="{ placeholder: 'Semua',
                              allowClear: true,width:'50%'}">
                            </l-select2>

                          </div> -->
                          <label id="example-radio-group-label">Format Laporan</label>
                          <mat-radio-group formControlName="format_laporan" aria-labelledby="example-radio-group-label"
                            class="example-radio-group">
                            <mat-radio-button value="view">View </mat-radio-button>
                            <mat-radio-button value="xls">XLS</mat-radio-button>
                            <mat-radio-button value="pdf">PDF</mat-radio-button>
                          </mat-radio-group>

                        </div>

                        <div class="form-group ">
                          <button type="submit" class="btn btn-primary btn-sm">Tampilkan</button>
                        </div>
                      </div>
                    </form>


                  </div>
                  <div class="tab-pane active" id="laporan_maintenance_rutin">
                    <form [formGroup]="laporanMaintenanceRutinForm" (ngSubmit)="reportMaintenanceRutin()">
                      <div class="card">
                        <div class="card-header">
                          <h4 class="card-title">Maintenance Rutin </h4>
                        </div>
                        <div class="card-content">

                          <div class="example-full-width " hidden>
                            <mat-form-field>
                              <mat-label>dari Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_mulai">
                            </mat-form-field>

                          </div>
                          <div class="example-full-width " hidden>
                            <mat-form-field>
                              <mat-label>s/d Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_akhir">
                            </mat-form-field>

                          </div>
                          <div class="form-group label-floating">
                            <label class="control-label">Mill</label>

                            <l-select2 [data]="dataSelectMill" formControlName="mill" [options]="{ placeholder: 'Pilih',
                        allowClear: false,width:'50%'}">
                            </l-select2>
                            <!-- <div *ngIf="isFormSubmitted && laporanMaintenanceRutinForm.controls['mill'].errors"
                              class="invalid-feedback">
                              <small [hidden]="!laporanMaintenanceRutinForm.controls['mill'].errors.required" class="text-danger">
                                Tidak boleh kosong!
                              </small>
                            </div> -->

                          </div>

                          <!-- <mat-radio-group formControlName="versi_laporan" aria-labelledby="example-radio-group-label"
                          class="example-radio-group">
                          <mat-radio-button value="v1">Versi 1 </mat-radio-button>
                          <mat-radio-button value="v2">Versi 2 </mat-radio-button>


                        </mat-radio-group> -->
                          <label id="example-radio-group-label">Format Laporan</label>
                          <mat-radio-group formControlName="format_laporan" aria-labelledby="example-radio-group-label"
                            class="example-radio-group">
                            <mat-radio-button value="view">View </mat-radio-button>
                            <mat-radio-button value="xls">XLS</mat-radio-button>
                            <mat-radio-button value="pdf">PDF</mat-radio-button>
                          </mat-radio-group>

                        </div>

                        <div class="form-group ">
                          <button type="submit" class="btn btn-primary btn-sm">Tampilkan</button>
                        </div>
                      </div>
                    </form>


                  </div>
                  <div class="tab-pane " id="laporan_by_mesin">
                    <form [formGroup]="laporanByMesinForm" (ngSubmit)="reportByMesin()">
                      <div class="card">
                        <div class="card-header">
                          <h4 class="card-title">By Mesin</h4>
                        </div>
                        <div class="card-content">

                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>dari Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_mulai">
                            </mat-form-field>

                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>s/d Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_akhir">
                            </mat-form-field>

                          </div>
                          <div class="form-group label-floating">
                            <label class="control-label">Mill</label>

                            <l-select2 [data]="dataSelectMill" formControlName="mill" [options]="{ placeholder: 'Pilih',
                        allowClear: false,width:'50%'}">
                            </l-select2>
                            <!-- <div *ngIf="isFormSubmitted && laporanMaintenanceRutinForm.controls['mill'].errors"
                              class="invalid-feedback">
                              <small [hidden]="!laporanMaintenanceRutinForm.controls['mill'].errors.required" class="text-danger">
                                Tidak boleh kosong!
                              </small>
                            </div> -->

                          </div>


                          <label id="example-radio-group-label">Format Laporan</label>
                          <mat-radio-group formControlName="format_laporan" aria-labelledby="example-radio-group-label"
                            class="example-radio-group">
                            <mat-radio-button value="view">View </mat-radio-button>
                            <mat-radio-button value="xls">XLS</mat-radio-button>
                            <mat-radio-button value="pdf">PDF</mat-radio-button>
                          </mat-radio-group>

                        </div>

                        <div class="form-group ">
                          <button type="submit" class="btn btn-primary btn-sm">Tampilkan</button>
                        </div>
                      </div>
                    </form>


                  </div>

                </div>
              </div> <!--    md col 8 -->
            </div>
          </div>
        </div>
      </div>

      <!-- </div> -->
    </div>
  </div>
</div>
