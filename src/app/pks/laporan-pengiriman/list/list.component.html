<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <!-- <div class="col-md-8 col-md-offset-2"> -->
      <!-- <h3 class="title text-center">Kelas Mapel</h3> -->
      <!-- <br /> -->
      <div class="col-md-12">
        <div class="card">
          <div class="card-header">
            <h4 class="card-title">Laporan -
              <small class="category">Pengiriman</small>
            </h4>
          </div>
          <div class="card-content">
            <div class="row">
              <div class="col-md-2">
                <ul class="nav nav-pills nav-pills-icons nav-pills-warning nav-stacked" role="tablist">
                  <!--
                  color-classes: "nav-pills-primary", "nav-pills-info", "nav-pills-success", "nav-pills-warning","nav-pills-danger"
              -->
                  <!-- <li class="active"> -->
                  <li class="active">
                    <a href="#laporan_pengiriman_detail" role="tab" data-toggle="tab">
                      <i class="material-icons">business</i>Laporan Pengiriman Detail
                    </a>
                  </li>
                  <li class="">
                    <a href="#laporan_pengiriman" role="tab" data-toggle="tab">
                      <i class="material-icons">person</i>Rekap Pengiriman
                    </a>
                  </li>

                  <!-- <li>
                    <a href="#lembur" role="tab" data-toggle="tab">
                      <i class="material-icons">account_balance_wallet</i>Laporan Lembur
                    </a>
                  </li> -->
                  <!--  <li>
                    <a href="#kasbank" role="tab" data-toggle="tab">
                      <i class="material-icons">business</i>Transaksi Kas Bank
                    </a>
                  </li>
                  <li>
                    <a href="#kasbank_saldo" role="tab" data-toggle="tab">
                      <i class="material-icons">local_atm</i>Saldo Kas Bank
                    </a>
                  </li> -->

                </ul>
              </div>
              <div class="col-md-8">
                <div class="tab-content">



                  <div class="tab-pane  " id="laporan_pengiriman">
                    <form [formGroup]="PengirimanForm" (ngSubmit)="reportPengiriman()">
                      <div class="card">
                        <div class="card-header">
                          <h4 class="card-title">Rekap Pengiriman</h4>
                        </div>
                        <div class="card-content">

                          <div class="form-group label-floating">
                            <label class="control-label">Customer</label>
                            <l-select2 [data]="dataSelectCustomer" formControlName="customer" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'70%'}">
                            </l-select2>
                          </div>

                          <div class="form-group label-floating">
                            <label class="control-label">Kontrak</label>
                            <l-select2 [data]="dataSelectKontrak" formControlName="kontrak" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'80%'}">
                            </l-select2>
                          </div>
                          <div class="form-group label-floating">
                            <label class="control-label">Transportir</label>
                            <l-select2 [data]="dataSelectTransportir" formControlName="transportir" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'70%'}">
                            </l-select2>
                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>dari Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_mulai">
                            </mat-form-field>
                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>s/d Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_akhir">
                            </mat-form-field>
                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>Dibuat Oleh</mat-label>
                              <input matInput formControlName="dibuat_oleh" >
                            </mat-form-field>

                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>Disetujui Oleh</mat-label>
                              <input matInput formControlName="disetujui_oleh" >
                            </mat-form-field>

                          </div>
                          <mat-radio-group formControlName="format_laporan" aria-labelledby="example-radio-group-label"
                            class="example-radio-group">
                            <mat-radio-button value="view">View </mat-radio-button>
                            <mat-radio-button value="xls">XLS</mat-radio-button>
                            <mat-radio-button value="pdf">PDF</mat-radio-button>
                          </mat-radio-group>

                          <div class="form-group">
                            <button type="submit" class="btn btn-primary btn-sm btn-rose">Tampilkan</button>
                          </div>

                        </div>
                      </div>
                    </form>
                  </div>
                  <div class="tab-pane active" id="laporan_pengiriman_detail">
                    <form [formGroup]="PengirimanDetailForm" >
                      <div class="card">
                        <div class="card-header">
                          <h4 class="card-title">Detail Pengiriman</h4>
                        </div>
                        <div class="card-content">

                          <div class="form-group label-floating">
                            <label class="control-label">Lokasi PKS</label>
                            <l-select2 [data]="dataSelectMill" formControlName="mill" [options]="{ placeholder: 'Pilih',
                        allowClear: false,width:'50%'}">
                            </l-select2>
                          </div>
                          <div class="form-group label-floating">
                            <label class="control-label">Customer</label>
                            <l-select2 [data]="dataSelectCustomer" formControlName="customer" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'70%'}">
                            </l-select2>
                          </div>
                          <div class="form-group label-floating">
                            <label class="control-label">Kontrak</label>
                            <l-select2 [data]="dataSelectSpk" formControlName="kontrak" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'80%'}">
                            </l-select2>
                          </div>
                          <div class="form-group label-floating">
                            <label class="control-label">Transportir</label>
                            <l-select2 [data]="dataSelectTransportir" formControlName="transportir" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'70%'}">
                            </l-select2>
                          </div>
                          <div class="form-group label-floating">
                            <label class="control-label">Produk</label>
                            <l-select2 [data]="dataSelectProduk" formControlName="produk_id" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'50%'}">
                            </l-select2>
                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>dari Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_mulai">
                            </mat-form-field>
                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>s/d Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_akhir">
                            </mat-form-field>
                          </div>
                          <mat-radio-group formControlName="format_laporan" aria-labelledby="example-radio-group-label"
                            class="example-radio-group">
                            <mat-radio-button value="view">View </mat-radio-button>
                            <mat-radio-button value="xls">XLS</mat-radio-button>
                            <mat-radio-button value="pdf">PDF</mat-radio-button>
                          </mat-radio-group>

                          <!-- <div class="form-group">
                            <button type="submit" class="btn btn-primary btn-sm btn-rose">Tampilkan</button>
                          </div> -->
                          <div class="form-group">
                            <button class="btn btn-primary btn-sm btn-rose"
                              (click)="reportPengirimanDetail('')" >Tampilkan</button>
                              <!-- <button type="button" class="btn btn-primary btn-sm btn-rose"
                              (click)="reportPengirimanDetail('excel')">Excel</button> -->
                          </div>

                        </div>
                      </div>
                    </form>
                  </div>


                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- </div> -->
    </div>
  </div>
</div>
