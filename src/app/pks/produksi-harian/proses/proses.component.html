<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <form [formGroup]="entryForm" (ngSubmit)="proses()">
        <!-- <p><b>Upload file excell : </b></p> -->
        <div class="well well-sm">

          <div class="card">
            <div class="card-header">
              <h4 class="card-title">Proses</h4>
            </div>
            <div class="card-content">


              <div class="form-group label-floating">
                <label class="control-label">Lokasi</label>
                <l-select2 [data]="dataSelectOrganisasi" formControlName="lokasi" [options]="{ placeholder: 'Pilih',
            allowClear: false,width:'90%'}">
                </l-select2>
              </div>

              <div class="example-full-width ">
                <mat-form-field>
                  <mat-label>dari Tanggal</mat-label>
                  <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                    class="form-control" formControlName="tanggal_mulai">
                </mat-form-field>
              </div>
              <div class="example-full-width ">
                <mat-form-field>
                  <mat-label>s/d Tanggal</mat-label>
                  <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                    class="form-control" formControlName="tanggal_akhir">
                </mat-form-field>
              </div>

              <!-- <div class="form-group">
                <button type="submit" class="btn btn-primary btn-sm btn-rose">Proses</button>
                <button type="button" class="btn btn-default btn-sm" data-dismiss="modal" (click)="onClose()">Batal</button>
              </div> -->

            </div>
          </div>
          <div class="row-fluid">
            <div class="span3">
              <button type="button" class="btn btn-default" data-dismiss="modal" (click)="onClose()">Batal</button>
              <button type="submit" class="btn btn-primary">Proses</button>
            </div>

          </div>

        </div>
      </form>
    </div>
  </div>
</div>
