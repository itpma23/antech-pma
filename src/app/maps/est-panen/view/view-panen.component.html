<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <form [formGroup]="entryForm">
        <div class="col-md-12">
          <div class="card">
            <div class="card-header card-header-icon" data-background-color="rose">
              <i class="material-icons">event</i>
            </div>
            <div class="card-content">
              <h4 class="card-title">Panen</h4>

              <div class="col-md-6">
                <div class="example-full-width ">
                  <mat-form-field>
                    <mat-label>NoTransaksi</mat-label>
                    <input matInput formControlName="no_transaksi" readonly>
                  </mat-form-field>

                </div>

                <div class="example-full-width ">
                  <mat-form-field>
                    <mat-label>Tanggal</mat-label>
                    <input matInput formControlName="tanggal" readonly>
                  </mat-form-field>

                </div>
                <div class="example-full-width ">
                  <mat-form-field>
                    <mat-label>Pemanen</mat-label>
                    <input matInput formControlName="pemanen" readonly>
                  </mat-form-field>

                </div>
                <div class="example-full-width ">
                  <mat-form-field>
                    <mat-label>Blok</mat-label>
                    <input matInput formControlName="blok" >
                  </mat-form-field>

                </div>
                <div class="example-full-width ">
                  <mat-form-field>
                    <mat-label>Janjang</mat-label>
                    <input matInput formControlName="janjang" readonly>
                  </mat-form-field>
                </div>
              </div>
              <div class="col-md-6">

                <img src="../../assets/img/image_placeholder.jpg" alt="..." *ngIf="panen.file==null">
                <img src="{{PATH_URL}}/{{pathName}}/userfiles/inspeksi/{{panen.file}}" *ngIf="panen.file!=null" />


              </div>
              <button type="button" class="btn btn-default" data-dismiss="modal" (click)="onClose()">Tutup</button>

            </div>

          </div>
        </div>
      </form>
    </div>
  </div>
</div>
