<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <form [formGroup]="entryForm" (ngSubmit)="onSubmit()">
        <div class="col-md-12">
          <div class="card">
            <div class="card-header card-header-icon" data-background-color="rose">
              <i class="material-icons">person</i>
            </div>
            <div class="card-content">
              <h4 class="card-title">Adjusment</h4>

              <div class="form-group label-floating">
                <label class="control-label">Lokasi</label>
                <l-select2 [data]="dataSelectLokasi" formControlName="lokasi_id" [options]="{ placeholder: 'Pilih',
                allowClear: true}">
                </l-select2>
                <div *ngIf="isFormSubmitted && userControl.lokasi_id.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.lokasi_id.errors.required " class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              <div class="form-group label-floating">
                <label class="control-label">Gudang</label>
                <l-select2 [data]="dataSelectGudang" formControlName="gudang_id" [options]="{ placeholder: 'Pilih',
                allowClear: true}">
                </l-select2>
                <div *ngIf="isFormSubmitted && userControl.gudang_id.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.gudang_id.errors.required " class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>

              </div> -->
              <div class="form-group label-floating">
                <label class="control-label">tanggal</label>
                <input type="text" [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker class="form-control"
                  formControlName="tanggal">
                <div class="form-control-position"><i class="ft-calendar"></i></div>
                <div *ngIf="isFormSubmitted && userControl.tanggal.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.tanggal.errors.required" class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>

                <div *ngIf="isFormSubmitted && userControl.no_ref.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.no_ref.errors.required" class="text-danger">

                  </small>
                </div>
              </div>
              <div class="example-full-width ">
                <mat-form-field>
                  <mat-label>No Transaksi</mat-label>
                  <input matInput formControlName="no_transaksi" required readonly>
                </mat-form-field>
                <div *ngIf="isFormSubmitted && userControl.no_transaksi.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.no_transaksi.errors.required" class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              <div class="example-full-width ">
                <mat-form-field>
                  <mat-label>Catatan</mat-label>
                  <input matInput formControlName="catatan" required>
                </mat-form-field>
                <div *ngIf="isFormSubmitted && userControl.catatan.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.catatan.errors.required" class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>

                <div formArrayName="details">
                  <fieldset class="container-fluid shift_content" [formGroupName]="i"
                    *ngFor="let blok of details.controls; let i=index; let odd=odd;">
                    <legend>
                      <button type="button" (keydown.enter)="$event.preventDefault()" (click)="removeBlok(blok)" class="btn btn-info btn-round btn-fab btn-fab-mini">
                        <i class="material-icons">close</i>
                      </button>
                    </legend>
                    <div class="xform-group col-md-6">
                      <label class="control-label">Item</label>
                      <l-select2 [data]="dataSelectItem" formControlName="item" [options]="{ placeholder: 'Pilih',
                      allowClear: true}" (ngModelChange)="cekHarga(blok)">
                      </l-select2>
                    </div>
                    <div class="form-group col-md-2">
                      <mat-form-field>
                        <mat-label>Uom</mat-label>
                        <input matInput formControlName="uom" required type="text">
                      </mat-form-field>
                    </div>
                    <div class="form-group col-md-3">
                      <mat-form-field>
                        <mat-label>Qty</mat-label>
                        <input matInput formControlName="qty" (change)="totalHarga(blok)">
                      </mat-form-field>
                    </div>
                    <div class="form-group col-md-3">
                      <mat-form-field>
                        <mat-label>Harga</mat-label>
                        <input matInput formControlName="harga" (change)="totalHarga(blok)">
                      </mat-form-field>
                    </div>
                    <div class="form-group col-md-3">
                      <mat-form-field>
                        <mat-label>Total</mat-label>
                        <input matInput formControlName="total" >
                      </mat-form-field>
                    </div>
                    <div class="form-group col-md-6">
                      <mat-form-field>
                        <mat-label>Keterangan</mat-label>
                        <input matInput formControlName="ket" required type="text">
                      </mat-form-field>
                    </div>
                  </fieldset>
                  <button type="button" (click)="addBlok()" class="btn btn-info btn-round btn-fab btn-fab-mini">
                    <i class="material-icons">add</i>
                  </button>
                </div>

              </div>






              <button type="button" class="btn btn-default" data-dismiss="modal" (click)="onClose()">Batal</button>
              <button type="submit" class="btn btn-fill btn-rose">Simpan</button>

            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
