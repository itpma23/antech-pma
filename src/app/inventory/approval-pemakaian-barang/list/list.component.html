<div class="main-content">
  <div class="container-fluid">

    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-header card-header-icon" data-background-color="red">
            <i class="material-icons">list</i>
          </div>

          <div class="card-content">
            <h4 class="card-title">Approval Pemakaian Barang</h4>

            <div class="toolbar">

              <div class="toolbar">
                <div class="panel-group" id="accordion" role="tablist" aria-multiselectable="true">
                  <div class="panel panel-default">
                    <div class="panel-heading" role="tab" id="headingOne">
                      <a role="button" data-toggle="collapse" data-parent="#accordion" href="#collapseOne"
                        aria-expanded="false" aria-controls="collapseOne">
                        <h4 class="panel-title">
                          Filter Data
                          <i class="material-icons">keyboard_arrow_down</i>
                        </h4>
                      </a>
                    </div>
                    <div id="collapseOne" class="panel-collapse collapse" role="tabpanel" aria-labelledby="headingOne">
                      <div class="panel-body">
                        <div class="card-content">
                          <form [formGroup]="parameterForm" (ngSubmit)="showData()">
                            <div class="card">

                              <div class="card-content">

                                <div class="example-full-width ">
                                  <mat-form-field>
                                    <mat-label>dari Tanggal</mat-label>
                                    <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker"
                                      bsDatepicker class="form-control" formControlName="tanggal_mulai">
                                  </mat-form-field>

                                </div>
                                <div class="example-full-width ">
                                  <mat-form-field>
                                    <mat-label>s/d Tanggal</mat-label>
                                    <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker"
                                      bsDatepicker class="form-control" formControlName="tanggal_akhir">
                                  </mat-form-field>
                                </div>

                                <div class="form-group label-floating">
                                  <label class="control-label">Lokasi</label>

                                  <l-select2 [data]="dataSelectLokasi" formControlName="lokasi" [options]="{ placeholder: 'Semua',
                            allowClear: true,width:'50%'}">
                                  </l-select2>
                                  <div class="form-group label-floating">
                                    <label class="control-label">Status</label>
                                    <l-select2 [data]="dataSelectStatus" formControlName="status" [options]="{ placeholder: 'Semua',
                                         allowClear: true,width:'50%'}">
                                    </l-select2>

                                  </div>

                                </div>

                              </div>

                              <div class="form-group ">

                                &nbsp; &nbsp; <button type="submit" class="btn btn-primary btn-sm">Filter</button>
                              </div>
                            </div>
                          </form>

                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="btn-group  " *ngIf="accessButton?.print_==true">
                  <button type="button" (click)="exportFiles('csv')"
                    class="btn btn-round btn-info btn-sm btn-rose">csv</button>
                  <button type="button" (click)="exportFiles('xlsx')"
                    class="btn btn-round btn-info btn-sm btn-rose">excel</button>
                  <!-- <button type="button" class="btn btn-round btn-info">3</button>  -->
                  <button type="button" (click)="exportFiles('pdf')"
                    class="btn btn-round btn-info btn-sm btn-rose">pdf</button>
                </div>
                <!-- <buton  type="button"(click)="add()" class="btn btn-primary btn-sm btn-pull-right">Tambah Pengajar</button> -->

              </div>
              <div class="table-responsive">
                <table id="mytable" datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger"
                  class="table table-striped table-no-bordered table-hover nowrap" cellspacing="0" width="100%">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>Lokasi</th>
                      <th>Afd/Stasiun/Traksi</th>
                      <th>Gudang</th>
                      <th>NoTransaksi</th>
                      <th>Tanggal</th>
                      <th>Catatan</th>
                      <th>Status</th>
                      <th>Aksi</th>
                    </tr>
                  </thead>
                  <!-- tbody dikosongkan, DataTables yang buat -->
                </table>
              </div>

            </div>
            <!-- end content-->
          </div>
          <!--  end card  -->
        </div>
        <!-- end col-md-12 -->
      </div>
      <!-- end row -->
    </div>
  </div>
