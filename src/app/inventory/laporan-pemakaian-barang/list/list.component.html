<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <!-- <div class="col-md-8 col-md-offset-2"> -->
      <!-- <h3 class="title text-center">Kelas Mapel</h3> -->
      <!-- <br /> -->
      <div class="col-md-12">
        <div class="card">
          <div class="card-header">
            <h4 class="card-title">Laporan -
              <small class="category">Pemakaian Barang</small>
            </h4>
          </div>
          <div class="card-content">
            <div class="row">
              <div class="col-md-2">
                <ul class="nav nav-pills nav-pills-icons nav-pills-warning nav-stacked" role="tablist">



                  <li class="active">
                    <a href="#laporan_rincian_pemakaian_barang" role="tab" data-toggle="tab">
                      <i class="material-icons">list</i> Rincian Pemakaian
                    </a>
                  </li>
                  <li class="">
                    <a href="#laporan_pemakaian_barang_by_tanggal" role="tab" data-toggle="tab">
                      <i class="material-icons">list</i> Pemakaian By Tanggal
                    </a>
                  </li>

                </ul>
              </div>
              <div class="col-md-8">
                <div class="tab-content">

                  <div class="tab-pane active  " id="laporan_rincian_pemakaian_barang">
                    <!-- <form [formGroup]="penerimaanTbsRincianExtForm" (ngSubmit)="reportPenerimaanTbsRincianExt()"> -->
                    <form [formGroup]="formRincianPemakaian">

                      <div class="card">
                        <div class="card-header">
                          <h4 class="card-title">Rincian Pemakaian Barang</h4>
                        </div>
                        <div class="card-content">
                          <div class="row">
                            <div class="form-group label-floating col-md-6">
                              <label class="control-label col-md-6">Lokasi</label>
                              <l-select2 [data]="dataSelectOrganisasi" formControlName="lokasi" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'100%'}">
                              </l-select2>
                            </div>
                            <div class="form-group label-floating col-md-6">
                              <label class="control-label col-md-6">Gudang</label>
                              <l-select2 [data]="dataSelectGudang" formControlName="gudang" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'100%'}">
                              </l-select2>
                            </div>
                            <div class="form-group label-floating col-md-6">
                              <label class="control-label col-md-6">Blok/mesin</label>
                              <l-select2 [data]="dataSelectBlok" formControlName="blok" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'100%'}">
                              </l-select2>
                            </div>
                            <div class="form-group label-floating col-md-6">
                              <label class="control-label col-md-6">Traksi</label>
                              <l-select2 [data]="dataSelectTraksi" formControlName="traksi" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'100%'}">
                              </l-select2>
                            </div>
                            <div class="form-group label-floating col-md-6">
                              <label class="control-label col-md-6">Item</label>
                              <l-select2 [data]="dataSelectItem" formControlName="item" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'100%'}">
                              </l-select2>
                            </div>
                            <div class="form-group label-floating col-md-6">
                              <label class="control-label col-md-6">Kegiatan</label>
                              <l-select2 [data]="dataSelectKegiatan" formControlName="kegiatan" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'100%'}">
                              </l-select2>
                            </div>
                          </div>

                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>Keterangan</mat-label>
                              <input matInput formControlName="keterangan">
                            </mat-form-field>
                          </div>

                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>dari Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_mulai">
                            </mat-form-field>
                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>s/d Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_akhir">
                            </mat-form-field>
                          </div>
                          <label id="example-radio-group-label">Format Laporan</label>
                          <mat-radio-group formControlName="format_laporan" aria-labelledby="example-radio-group-label"
                            class="example-radio-group">
                            <mat-radio-button value="view">View </mat-radio-button>
                            <mat-radio-button value="xls">XLS</mat-radio-button>
                            <mat-radio-button value="pdf">PDF</mat-radio-button>
                          </mat-radio-group>

                          <!-- <div class="form-group">
                            <button type="submit" class="btn btn-primary btn-sm btn-rose">Tampilkan</button>
                          </div> -->
                          <div class="form-group">
                            <button class="btn btn-primary btn-sm btn-rose"
                              (click)="reportRincianPemakaian('')">Tampilkan</button>
                            <!-- <button type="button" class="btn btn-primary btn-sm btn-rose"
                              (click)="reportRincianPemakaian('excel')">Excel</button> -->
                          </div>

                        </div>
                      </div>
                    </form>
                  </div>
                  <div class="tab-pane  " id="laporan_pemakaian_barang_by_tanggal">
                    <form [formGroup]="frmPemakaianByTanggal">

                      <div class="card">
                        <div class="card-header">
                          <h4 class="card-title">Pemakaian Barang By Tanggal</h4>
                        </div>
                        <div class="card-content">
                          <div class="row">
                            <div class="form-group label-floating col-md-6">
                              <label class="control-label col-md-6">Lokasi</label>
                              <l-select2 [data]="dataSelectOrganisasi" formControlName="lokasi" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'100%'}">
                              </l-select2>
                            </div>
                            <div class="form-group label-floating col-md-6">
                              <label class="control-label col-md-6">Gudang</label>
                              <l-select2 [data]="dataSelectGudang2" formControlName="gudang" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'100%'}">
                              </l-select2>
                            </div>
                            <div class="example-full-width col-md-6">
                              <mat-form-field>
                                <mat-label>dari Tanggal</mat-label>
                                <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker"
                                  bsDatepicker class="form-control" formControlName="tanggal_mulai">
                              </mat-form-field>
                            </div>
                            <div class="example-full-width  col-md-6">
                              <mat-form-field>
                                <mat-label>s/d Tanggal</mat-label>
                                <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker"
                                  bsDatepicker class="form-control" formControlName="tanggal_akhir">
                              </mat-form-field>
                            </div>
                            <div class="form-group label-floating col-md-6">
                              <label class="control-label col-md-6">Kategori Item</label>
                              <l-select2 [data]="dataSelectKategoriItem" formControlName="kategori_item" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'100%'}">
                              </l-select2>
                            </div>
                            <label id="example-radio-group-label">Format Laporan</label>
                            <mat-radio-group formControlName="format_laporan"
                              aria-labelledby="example-radio-group-label" class="example-radio-group">
                              <mat-radio-button value="view">View </mat-radio-button>
                              <mat-radio-button value="xls">XLS</mat-radio-button>
                              <mat-radio-button value="pdf">PDF</mat-radio-button>
                            </mat-radio-group>
                            <div class="form-group">
                              <button class="btn btn-primary btn-sm btn-rose"
                                (click)="reportPemakaianByTanggal('')">Tampilkan</button>
                            </div>

                          </div>
                        </div>
                      </div>
                    </form>
                  </div>

                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- </div> -->
    </div>
  </div>
</div>
