<div class="main-content" >
  <div class="container-fluid"  >
    <div class="row" >
      <form [formGroup]="entryForm" (ngSubmit)="onSubmit()">
        <div class="col-md-12">
          <div class="card">
            <div class="card-header card-header-icon" data-background-color="rose">
              <i class="material-icons">person</i>
            </div> 
            <div class="card-content">
              <h4 class="card-title">BJR</h4>
              <!-- <div class="example-full-width ">
                <mat-form-field>
                  <mat-label>Tanggal Efektif</mat-label>
                  <input matInput type="text" [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                    class="form-control" formControlName="tanggal_efektif" required>
                </mat-form-field>
                <div *ngIf="isFormSubmitted && userControl.tanggal_efektif.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.tanggal_efektif.errors.required" class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div> -->
             
              <div class="form-group label-floating">
                <label class="control-label">Blok</label>
                <l-select2 [data]="dataSelectLokasi" formControlName="blok_id" [options]="{ placeholder: 'Pilih',
                allowClear: false,width:'90%'}">
                </l-select2>
                <div *ngIf="isFormSubmitted && userControl.blok_id.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.blok_id.errors.required " class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>

              <div class="example-full-width ">
                <mat-form-field>
                  <mat-label>Bjr</mat-label>
                  <input matInput formControlName="bjr" required type="text">
                </mat-form-field>
                <div *ngIf="isFormSubmitted && userControl.bjr.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.bjr.errors.required" class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              
              <button type="button" class="btn btn-default" data-dismiss="modal" (click)="onClose()">Batal</button>
              <button type="submit" class="btn btn-fill btn-rose">Simpan</button>
                        
            </div>
          </div>
        </div>
        
        
     
      </form>
    </div>
  </div>
</div>
