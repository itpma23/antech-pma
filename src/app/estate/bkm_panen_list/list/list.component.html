<div class="main-content">
  <div class="container-fluid">

    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-header card-header-icon" data-background-color="red">
            <i class="material-icons">list</i>
          </div>

          <div class="card-content">
            <h4 class="card-title">BKM PANEN</h4>

            <div class="toolbar">

              <div class="toolbar">
                <div class="panel-group" id="accordion" role="tablist" aria-multiselectable="true">
                  <div class="panel panel-default">
                    <div class="panel-heading" role="tab" id="headingOne">
                      <a role="button" data-toggle="collapse" data-parent="#accordion" href="#collapseOne"
                        aria-expanded="false" aria-controls="collapseOne">
                        <h4 class="panel-title">
                          Filter Data
                          <i class="material-icons">keyboard_arrow_down</i>
                        </h4>
                      </a>
                    </div>
                    <div id="collapseOne" class="panel-collapse collapse" role="tabpanel" aria-labelledby="headingOne">
                      <div class="panel-body">
                        <div class="card-content">
                          <form [formGroup]="parameterForm" (ngSubmit)="showData()">
                            <div class="card">

                              <div class="card-content">

                                <div class="example-full-width ">
                                  <mat-form-field>
                                    <mat-label>dari Tanggal</mat-label>
                                    <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker"
                                      bsDatepicker class="form-control" formControlName="tanggal_mulai">
                                  </mat-form-field>

                                </div>
                                <div class="example-full-width ">
                                  <mat-form-field>
                                    <mat-label>s/d Tanggal</mat-label>
                                    <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker"
                                      bsDatepicker class="form-control" formControlName="tanggal_akhir">
                                  </mat-form-field>
                                </div>

                                <div class="form-group label-floating">
                                  <label class="control-label">Lokasi</label>

                                  <l-select2 [data]="dataSelectLokasi" formControlName="lokasi" [options]="{ placeholder: 'Semua',
                            allowClear: true,width:'50%'}">
                                  </l-select2>
                                </div>
                                <div class="form-group label-floating">
                                  <label class="control-label">Status</label>
                                  <l-select2 [data]="dataSelectStatus" formControlName="status" [options]="{ placeholder: 'Semua',
                                       allowClear: true,width:'50%'}">
                                  </l-select2>

                                </div>

                              </div>

                              <div class="form-group ">

                                &nbsp; &nbsp; <button type="submit" class="btn btn-primary btn-sm">Filter</button>
                                <button type="submit" class="btn btn-primary btn-sm"
                                  (click)="exportExcel()">Excel</button>
                                <button type="submit" class="btn btn-primary btn-sm" (click)="ListDetail()">View
                                  Detail</button>
                              </div>
                            </div>
                          </form>

                        </div>
                      </div>
                    </div>
                  </div>
                </div>


                <div class="btn-group  " *ngIf="accessButton?.print_==true">
                  <button type="button" (click)="exportFiles('csv')"
                    class="btn btn-round btn-info btn-sm btn-rose">csv</button>
                  <button type="button" (click)="exportFiles('xlsx')"
                    class="btn btn-round btn-info btn-sm btn-rose">excel</button>
                  <!-- <button type="button" class="btn btn-round btn-info">3</button>  -->
                  <button type="button" (click)="exportFiles('pdf')"
                    class="btn btn-round btn-info btn-sm btn-rose">pdf</button>
                </div>
                <!-- <button type="button" (click)="add()" *ngIf="accessButton?.new_==true"
                  class="btn btn-primary btn-info btn-sm btn pull-right btn-rose">Tambah BKM</button> -->

              </div>
              <div class="">
                <table id="mytable" [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" datatable
                  class="table table-striped table-no-bordered table-hover" cellspacing="0" width="100%"
                  style="width:100%">
                  <!-- <table id="mytable" datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" class="tables table-striped table-no-bordered table-hover" cellspacing="0"
              width="90%" style="width:90%"> -->
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th></th>
                      <th>Lokasi</th>
                      <th>Afdeling</th>
                      <th>No Transaksi</th>
                      <th>Tanggal</th>
                      <th>Pemanen </th>
                      <th>Blok </th>
                      <th>Janjang </th>
                      <!-- <th>Users</th> -->
                    </tr>
                  </thead>
                  <tbody *ngIf="estBkmPanen?.length != 0">
                    <tr *ngFor="let p of estBkmPanen; index as i">
                      <td>
                        <img *ngIf="p?.file == null" src='../assets/img/faces/avatar.png' width="100px" height="100px"/>
                        <img *ngIf="p?.file != null" 
                          src="{{PATH_URL}}/{{pathName}}/userfiles/inspeksi/{{p.file}}" />
                      </td>
                      <td>{{p.lokasi}}</td>
                      <td>{{p.rayon_afdeling}}</td>
                      <td>{{p.no_transaksi}}</td>
                      <td>{{p.tanggal}}</td>
                      <td>{{p.pemanen}}</td>
                      <td>{{p.blok}}</td>
                      <td>{{p.hasil_kerja_jjg}}</td>
                      <!-- <td>{{p.asisten}}</td> -->
                      <!-- <td><span *ngIf="p.is_posting==1" class="label label-success">Sudah Posting</span>
                        <span *ngIf="p.is_posting!=1" class="label label-danger">Belum Posting</span>
                      </td> -->
                      <!-- <td>
                        <span style="font-size:10px;" class="md-caption"> <b>dibuat</b> : {{p.dibuat}},
                          {{p.dibuat_tanggal | date: 'dd/MM/yyyy'}}</span> <br>
                        <span style="font-size:10px;" class="md-caption"> <b>diubah</b> : {{p.diubah}},
                          {{p.diubah_tanggal | date: 'dd/MM/yyyy'}}</span> <br>
                        <span style="font-size:10px;" class="md-caption"> <b>dipost</b> : {{p.diposting}},
                          {{p.diposting_tanggal | date: 'dd/MM/yyyy'}}</span>
                      </td> -->


                      <td style="width:15%" class="text-right">
                        <!-- <a href="#" onclick="event.preventDefault()" (click)="posting(p.id)"
                          class="btn btn-simple btn-warning btn-icon" rel="tooltip" data-placement="bottom"
                          title="Posting" *ngIf="accessButton?.posting_==true && p.is_posting!=1"><i
                            class="material-icons">person</i></a> -->
                        <a href="#" onclick="event.preventDefault()" (click)="edit(p.id)"
                          *ngIf="accessButton?.edit_==true &&  p.is_posting!=1"
                          class="btn btn-simple btn-warning btn-icon edit"><i class="material-icons">pageview</i></a>

                      </td>
                    </tr>
                  </tbody>
                  <tfoot *ngIf="estBkmPanen?.length == 0" class="tfoot_dt">

                  </tfoot>
                </table>
              </div>
            </div>
            <!-- end content-->
          </div>
          <!--  end card  -->
        </div>
        <!-- end col-md-12 -->
      </div>
      <!-- end row -->
    </div>
  </div>
