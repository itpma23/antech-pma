<div class="main-content">
  <div class="container-fluid">

    <div class="row">
      <div class="col-md-12">

        <div class="card">
          <div class="card-header card-header-icon" data-background-color="red">
            <i class="material-icons">list</i>
          </div>

          <div class="card-content">
            <h4 class="card-title">Daftar Data Rekap</h4>

            <div class="mb-2">
              <button type="button" class="btn btn-default btn-sm" (click)="onClose()">
                Tutup
              </button>
            </div>

            <div class="content table-responsive">
              <table id="mytable" datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger"
                class="table table-striped table-no-bordered table-hover" width="100%">
                <thead>
                  <tr>
                    <th hidden>ID</th> <!-- wajib!! -->
                    <th style="width:40px;">#</th>
                    <th>No Rekap</th>
                    <th>No Kontrak</th>
                    <th>Tanggal</th>
                    <th>QTY</th>
                    <th>Harga</th>
                    <th>Total</th>
                  </tr>
                </thead>

                <tbody></tbody>
              </table>

            </div>

            <div class="mt-3">
              <button class="btn btn-success btn-sm" (click)="submitSelected()">
                Pilih Rekap
              </button>
              <button class="btn btn-default btn-sm" (click)="onClose()">
                Tutup
              </button>
            </div>

          </div>
        </div>

      </div>
    </div>

  </div>
</div>
