<div class="main-content">
  <div class="container-fluid">

    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-header card-header-icon" data-background-color="red">
            <i class="material-icons">list</i>
          </div>

          <div class="card-content">
            <h4 class="card-title">Auto Jurnal</h4>

            <div class="toolbar">


              <div class="btn-group  " *ngIf="accessButton?.print_==true">
                <button type="button" (click)="exportFiles('csv')" class="btn btn-round btn-info btn-sm btn-rose">csv</button>
                <button type="button" (click)="exportFiles('xlsx')" class="btn btn-round btn-info btn-sm btn-rose">excel</button>
                <!-- <button type="button" class="btn btn-round btn-info">3</button>  -->
                <button type="button" (click)="exportFiles('pdf')" class="btn btn-round btn-info btn-sm btn-rose">pdf</button>
              </div>
              <button type="button" (click)="add()" *ngIf="accessButton?.new_==true" class="btn btn-primary btn-info btn-sm btn pull-right btn-rose">Tambah Akun</button>
              <!-- <buton  type="button"(click)="add()" class="btn btn-primary btn-sm btn-pull-right">Tambah Pengajar</button> -->

            </div>
            <div class="">
              <table id="mytable" [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" datatable
                class="table table-striped table-no-bordered table-hover" cellspacing="0" width="100%"
                style="width:100%">
                <!-- <table id="mytable" datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" class="tables table-striped table-no-bordered table-hover" cellspacing="0"
              width="90%" style="width:90%"> -->
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Akun </th>
                    <th>Akun Debet</th>
                    <th>Akun kredit</th>
                    <th>Kode</th>
                    <th>Keterangan</th>
                    <th>Users</th>
                    <th></th>
                </thead>
                <tbody *ngIf="AccAutoJurnal?.length != 0">
                  <tr *ngFor="let p of AccAutoJurnal; index as i">

                    <td>{{p.akun}}</td>
                    <td>{{p.akun_debet}}</td>
                    <td>{{p.akun_kredit}}</td>
                    <td>{{p.kode}}</td>
                    <td>{{p.ket}}</td>
                    <td>
                      <span style="font-size:10px;" class="md-caption"> <b>dibuat</b> : {{p.dibuat}}, {{p.dibuat_tanggal | date:'dd/MM/yyyy'}}</span> <br>
                      <span style="font-size:10px;" class="md-caption"> <b>diubah</b> : {{p.diubah}}, {{p.diubah_tanggal | date:'dd/MM/yyyy'}}</span>  <br>
                    </td>
                    <td class="text-right" style="width:10%">
                        <a href="#" onclick="event.preventDefault()" (click)="edit(p.id)"
                        class="btn btn-simple btn-warning btn-icon edit"><i class="material-icons">edit</i></a>
                      <a href="#" onclick="event.preventDefault()" (click)="delete(p.id)"
                        class="btn btn-simple btn-danger btn-icon remove"><i class="material-icons">close</i></a>
                    </td>
                  </tr>
                </tbody>
                <tfoot *ngIf="AccAutoJurnal?.length == 0" class="tfoot_dt">

                </tfoot>
              </table>
            </div>
          </div>
          <!-- end content-->
        </div>
        <!--  end card  -->
      </div>
      <!-- end col-md-12 -->
    </div>
    <!-- end row -->
  </div>
</div>
