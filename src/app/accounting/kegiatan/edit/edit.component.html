<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <form [formGroup]="entryForm" (ngSubmit)="onSubmit()">
        <div class="col-md-12">
          <div class="card">
            <div class="card-header card-header-icon" data-background-color="rose">
              <i class="material-icons">person</i>
            </div>
            <div class="card-content">
              <h4 class="card-title">Kegiatan</h4>


              <div class="example-full-width ">
                <mat-form-field>
                  <mat-label>Kode</mat-label>
                  <input matInput formControlName="kode" required type="text">
                </mat-form-field>
                <div *ngIf="isFormSubmitted && userControl.kode.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.kode.errors.required" class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              <div class="example-full-width ">
                <mat-form-field>
                  <mat-label>Nama </mat-label>
                  <input matInput formControlName="nama" required type="text">
                </mat-form-field>
                <div *ngIf="isFormSubmitted && userControl.nama.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.nama.errors.required" class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              <div class="form-group label-floating">
                <label class="control-label">Satuan</label>

                <l-select2 [data]="dataSelectSatuan" formControlName="uom_id" [options]="{ placeholder: 'Pilih',
              allowClear: false,width:'90%'}">
                </l-select2>
                <div *ngIf="isFormSubmitted && userControl.uom_id.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.uom_id.errors.required " class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              <div class="form-group label-floating">
                <label class="control-label">Kelompok Kegiatan</label>
                <l-select2 [data]="dataSelectKegiatan" formControlName="kegiatan_kelompok_id" [options]="{ placeholder: 'Pilih',
                allowClear: false,width:'90%'}">
                </l-select2>
                <div *ngIf="isFormSubmitted && userControl.kegiatan_kelompok_id.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.kegiatan_kelompok_id.errors.required " class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              <div class="form-group label-floating">
                <label class="control-label">Tipe Biaya</label>
                <l-select2 [data]="dataSelectTipeKegiatan" formControlName="tipe_kegiatan_id" [options]="{ placeholder: 'Pilih',
                allowClear: false,width:'90%'}">
                </l-select2>
                <div *ngIf="isFormSubmitted && userControl.tipe_kegiatan_id.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.tipe_kegiatan_id.errors.required " class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              <div class="form-group label-floating">
                <label class="control-label">Akun</label>
                <l-select2 [data]="dataSelectAkun" formControlName="acc_akun_id" [options]="{ placeholder: 'Pilih',
                allowClear: false,width:'90%'}">
                </l-select2>
                <div *ngIf="isFormSubmitted && userControl.acc_akun_id.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.acc_akun_id.errors.required " class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              <div>
                <label>
                  <input formControlName="is_pemeliharaan" type="checkbox" name="optionsCheckboxes"> Pemeliharaan
                </label>
              </div>

              <div>
                <label>
                  <input formControlName="is_bahan" type="checkbox" name="optionsCheckboxes"> Bahan
                </label>
              </div>
              <div>
                <label>
                  <input formControlName="is_traksi" type="checkbox" name="optionsCheckboxes"> Traksi Estate
                </label>
              </div>
              <div>
                <label>
                  <input formControlName="is_umum" type="checkbox" name="optionsCheckboxes"> Umum
                </label>
              </div>
              <div>
                <label>
                  <input formControlName="is_traksi_mill" type="checkbox" name="optionsCheckboxes"> Traksi Mill
                </label>
              </div>

              <div class="example-full-width ">
                <mat-form-field>
                  <mat-label>Basis</mat-label>
                  <input matInput formControlName="basis" required type="text">
                </mat-form-field>
                <div *ngIf="isFormSubmitted && userControl.basis.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.basis.errors.required" class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              <div class="example-full-width ">
                <mat-form-field>
                  <mat-label>Premi Basis</mat-label>
                  <input matInput formControlName="premi_basis" required type="text">
                </mat-form-field>
                <div *ngIf="isFormSubmitted && userControl.premi_basis.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.premi_basis.errors.required" class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              <div class="example-full-width ">
                <mat-form-field>
                  <mat-label>Premi Lebih Basis</mat-label>
                  <input matInput formControlName="premi_lebih_basis" required type="text">
                </mat-form-field>
                <div *ngIf="isFormSubmitted && userControl.premi_lebih_basis.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.premi_lebih_basis.errors.required" class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              <div>
                <label>
                  <input formControlName="is_premi_otomatis" type="checkbox" name="optionsCheckboxes"> Hitung Premi
                  Otomatis
                </label>
              </div>
              <button type="button" class="btn btn-default" data-dismiss="modal" (click)="onClose()">Batal</button>
              <button type="submit" class="btn btn-fill btn-rose">Simpan</button>

            </div>
          </div>
        </div>



      </form>
    </div>
  </div>
</div>
