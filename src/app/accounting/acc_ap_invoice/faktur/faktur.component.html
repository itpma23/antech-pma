<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <form [formGroup]="entryForm" (ngSubmit)="onSubmit()">
        <div class="col-md-12">
          <div class="card">
            <div class="card-header card-header-icon" data-background-color="rose">
              <i class="material-icons">list</i>
            </div>
            <div class="card-content">
              <h4 class="card-title">Faktur Pajak</h4>
              <br><br>


              <div class="example-full-width">
                <mat-form-field>
                  <mat-label>No Faktur</mat-label>
                  <input matInput formControlName="no_faktur_pajak" type="text">
                </mat-form-field>
                <div *ngIf="isFormSubmitted && userControl.no_faktur_pajak.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.no_faktur_pajak.errors.required" class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>


              <br><br>
              <button type="button" class="btn btn-default" data-dismiss="modal" (click)="onClose()">Batal</button>
              <button type="submit" class="btn btn-fill btn-rose">Simpan</button>

            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
