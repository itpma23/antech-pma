        <div class="card">

            <h4 class="card-title">Laporan -

          <div class="card-content">
            <div class="row">
              <div class="col-md-2">
                <ul class="nav nav-pills nav-pills-icons nav-pills-success nav-stacked" role="tablist">

                    </a>
                  </li>

              </div>
              <div class="col-md-10">
                <div class="tab-content">



                  <div class="tab-pane active" id="neraca_saldo">
                    <form [formGroup]="UangMukaRekapForm" (ngSubmit)="reportSaldo()">
                      <div class="card">
                        <div class="card-header">
                          <h4 class="card-title">Rekap Uang Muka</h4>
                        </div>
                        <div class="card-content">

                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>dari Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_mulai">
                            </mat-form-field>

                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>s/d Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_akhir">
                            </mat-form-field>

                          </div>
                          <div class="form-group label-floating">
                            <label class="control-label">Lokasi</label>

                            <l-select2 [data]="dataSelectLokasi" formControlName="lokasi" [options]="{ placeholder: 'Pilih',
                        allowClear: false,width:'50%'}">
                            </l-select2>
                            <div *ngIf="isFormSubmitted2 && UangMukaRekapForm.controls['lokasi'].errors"
                              class="invalid-feedback">
                              <small [hidden]="!UangMukaRekapForm.controls['lokasi'].errors.required" class="text-danger">
                                Tidak boleh kosong!
                              </small>
                            </div>

                          </div>

                         </div>

                        <div class="form-group ">

                          <button type="submit"  class="btn btn-primary btn-sm">Tampilkan</button>
                        </div>
                      </div>
                    </form>

                  </div>
