<div class="main-content-wrapper py-2">
  <div class="container-fluid">
    <form [formGroup]="entryForm" (ngSubmit)="onSubmit()" class="modern-form">
      <div class="row g-4">

        <div class="col-xl-6 col-lg-6">
          <div class="modern-card">
            <div class="card-badge-header">
              <span class="badge-icon"><i class="material-icons">assignment</i></span>
              <h6 class="card-form-title">Kontrak Trading</h6>
            </div>

            <div class="card-body-content">
              <div class="form-group mb-3">
                <label class="form-label-custom">Lokasi</label>
                <l-select2 [data]="dataSelectMill" formControlName="lokasi_id"
                  [options]="{ placeholder: 'Pilih Lokasi', allowClear: false, width:'100%'}">
                </l-select2>
                <div *ngIf="isFormSubmitted && userControl.lokasi_id.errors" class="error-msg">
                  <small *ngIf="userControl.lokasi_id.errors.required">Tidak boleh kosong!</small>
                </div>
              </div>

              <div class="form-group mb-3">
                <label class="form-label-custom">No Kontrak <span class="text-danger">*</span></label>
                <input type="text" class="form-control custom-input" formControlName="no_spk"
                  placeholder="Masukkan nomor kontrak">
                <div *ngIf="isFormSubmitted && userControl.no_spk.errors?.required" class="error-msg">
                  Tidak boleh kosong!
                </div>
              </div>

              <div class="form-group mb-3">
                <label class="form-label-custom">No Referensi <span class="text-danger">*</span></label>
                <input type="text" class="form-control custom-input" formControlName="no_ref"
                  placeholder="Masukkan nomor referensi">
                <div *ngIf="isFormSubmitted && userControl.no_ref.errors?.required" class="error-msg">
                  Tidak boleh kosong!
                </div>
              </div>

              <div class="form-group mb-3">
                <label class="form-label-custom">Tanggal <span class="text-danger">*</span></label>
                <input type="text" class="form-control custom-input" [bsConfig]="datepickerConfig" #dp="bsDatepicker"
                  bsDatepicker formControlName="tanggal">
                <div *ngIf="isFormSubmitted && userControl.tanggal.errors?.required" class="error-msg">
                  Tidak boleh kosong!
                </div>
              </div>

              <div class="form-group mb-3">
                <label class="form-label-custom">Customer</label>
                <l-select2 [data]="dataSelectCustomer" formControlName="customer_id"
                  [options]="{ placeholder: 'Pilih Customer', allowClear: false, width:'100%'}">
                </l-select2>
                <div *ngIf="isFormSubmitted && userControl.customer_id.errors" class="error-msg">
                  <small *ngIf="userControl.customer_id.errors.required">Tidak boleh kosong!</small>
                </div>
              </div>

              <div class="form-group mb-3">
                <label class="form-label-custom">Alamat Pengiriman <span class="text-danger">*</span></label>
                <input type="text" class="form-control custom-input" formControlName="alamat_pengiriman"
                  placeholder="Alamat pengiriman">
                <div *ngIf="isFormSubmitted && userControl.alamat_pengiriman.errors?.required" class="error-msg">
                  Tidak boleh kosong!
                </div>
              </div>

              <div class="form-group mb-3">
                <label class="form-label-custom">Alamat Penagihan <span class="text-danger">*</span></label>
                <input type="text" class="form-control custom-input" formControlName="alamat_penagihan"
                  placeholder="Alamat penagihan">
                <div *ngIf="isFormSubmitted && userControl.alamat_penagihan.errors?.required" class="error-msg">
                  Tidak boleh kosong!
                </div>
              </div>

              <div class="form-group mb-3">
                <label class="form-label-custom">PIC <span class="text-danger">*</span></label>
                <input type="text" class="form-control custom-input" formControlName="pic" placeholder="Nama PIC">
                <div *ngIf="isFormSubmitted && userControl.pic.errors?.required" class="error-msg">
                  Tidak boleh kosong!
                </div>
              </div>

              <div class="form-group mb-3">
                <label class="form-label-custom">Produk</label>
                <l-select2 [data]="dataSelectItem" formControlName="produk_id"
                  [options]="{ placeholder: 'Pilih Produk', allowClear: false, width:'100%'}">
                </l-select2>
                <div *ngIf="isFormSubmitted && userControl.produk_id.errors" class="error-msg">
                  <small *ngIf="userControl.produk_id.errors.required">Tidak boleh kosong!</small>
                </div>
              </div>

              <br>

              <div class="pricing-section p-3 rounded-3 mt-4">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label-custom">Jumlah <span class="text-danger">*</span></label>
                    <input type="number" class="form-control custom-input shadow-none" formControlName="jumlah"
                      (ngModelChange)="valueChange($event)">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label-custom">Harga Satuan <span class="text-danger">*</span></label>
                    <input type="number" class="form-control custom-input shadow-none" formControlName="harga_satuan"
                      (ngModelChange)="valueChange($event)">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label-custom">PPN (%)</label>
                    <input type="number" class="form-control custom-input shadow-none" formControlName="ppn"
                      (ngModelChange)="valueChange($event)">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label-custom">PPH (%)</label>
                    <input type="number" class="form-control custom-input shadow-none" formControlName="pph"
                      (ngModelChange)="valueChange($event)">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label-custom">Sub Total</label>
                    <input type="number" class="form-control custom-input readonly-input" formControlName="sub_total"
                      readonly>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label-custom text-blue fw-bold">Total</label>
                    <input type="number" class="form-control custom-input total-highlight-input" formControlName="total"
                      readonly>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </div>

        <div class="col-xl-6 col-lg-6">
          <div class="modern-card h-100 d-flex flex-column justify-content-between">
            <div class="card-body-content pt-4">

              <div class="form-group mb-3">
                <label class="form-label-custom">Periode Kirim Awal <span class="text-danger">*</span></label>
                <input type="text" class="form-control custom-input" [bsConfig]="datepickerConfig"
                  #dp="bsDatepicker" bsDatepicker formControlName="periode_kirim_awal">
              </div>

              <div class="form-group mb-3">
                <label class="form-label-custom">Periode Kirim Akhir <span class="text-danger">*</span></label>
                <input type="text" class="form-control custom-input" [bsConfig]="datepickerConfig"
                  #dp="bsDatepicker" bsDatepicker formControlName="periode_kirim_akhir">
              </div>

              <h5 class="section-subtitle mb-3 mt-4">Spesifikasi Kualitas</h5>
              <div class="row g-3 p-3 bg-light rounded-3 mb-4">
                <div class="col-md-4 col-6">
                  <label class="form-label-custom">FFA</label>
                  <input type="number" class="form-control custom-input bg-white shadow-none" formControlName="ffa">
                </div>
                <div class="col-md-4 col-6">
                  <label class="form-label-custom">MI</label>
                  <input type="number" class="form-control custom-input bg-white shadow-none" formControlName="mi">
                </div>
                <div class="col-md-4 col-6">
                  <label class="form-label-custom">Impurities</label>
                  <input type="number" class="form-control custom-input bg-white shadow-none"
                    formControlName="impurities">
                </div>
                <div class="col-md-4 col-6">
                  <label class="form-label-custom">Dobi</label>
                  <input type="number" class="form-control custom-input bg-white shadow-none" formControlName="dobi">
                </div>
                <div class="col-md-4 col-6">
                  <label class="form-label-custom">Moisture</label>
                  <input type="number" class="form-control custom-input bg-white shadow-none"
                    formControlName="moisture">
                </div>
                <div class="col-md-4 col-6">
                  <label class="form-label-custom">Grading</label>
                  <input type="number" class="form-control custom-input bg-white shadow-none" formControlName="grading">
                </div>
              </div>

              <div class="form-group mb-3">
                <label class="form-label-custom">Toleransi</label>
                <input type="text" class="form-control custom-input" formControlName="toleransi" placeholder="0">
              </div>

              <div class="form-group mb-3">
                <label class="form-label-custom">Keterangan</label>
                <textarea class="form-control custom-textarea" formControlName="keterangan" rows="5"
                  placeholder="Tambahkan catatan keterangan di sini..."></textarea>
              </div>

            </div>

            <div class="card-footer-actions d-flex justify-content-end gap-2 p-3 border-top bg-white">
              <button type="button" class="btn btn-danger-custom px-4 py-2" (click)="onClose()">Batal</button>
              <button type="submit" class="btn btn-primary-custom px-4 py-2">Simpan Kontrak</button>
            </div>
          </div>
        </div>

      </div>
    </form>

  </div>
</div>
