<div class="main-content">
  <div class="container-fluid">

    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-header card-header-icon" data-background-color="red">
            <i class="material-icons">list</i>
          </div>

          <div class="card-content">
            <h4 class="card-title">Approval Permintaan Pembelian</h4>

            <div class="toolbar">


              <div class="btn-group" *ngIf="accessButton?.print_==true">
                <button type="button" (click)="exportFiles('csv')"
                  class="btn btn-round btn-info btn-sm btn-rose">csv</button>
                <button type="button" (click)="exportFiles('xlsx')"
                  class="btn btn-round btn-info btn-sm btn-rose">excel</button>
                <!-- <button type="button" class="btn btn-round btn-info">3</button>  -->
                <button type="button" (click)="exportFiles('pdf')"
                  class="btn btn-round btn-info btn-sm btn-rose">pdf</button>
              </div>
              <!-- <button type="button" (click)="add()" class="btn btn-primary btn-info btn-sm btn pull-right btn-rose">Tambah Permintaan Pembelian</button> -->


            </div>
            <div class="table-responsive">
              <table id="mytable" datatable [dtOptions]="dtOptions" [dtTrigger]="dtTrigger"
                class="table table-striped table-no-bordered table-hover" width="100%">
                <thead>
                  <tr>
                    <th></th> <!-- control responsive -->
                    <th>Lokasi</th>
                    <th>No PP</th>
                    <th>Tanggal</th>
                    <th>Catatan</th>
                    <th>Status</th>
                    <th></th> <!-- aksi -->
                  </tr>
                </thead>
              </table>
            </div>

          </div>
          <!-- end content-->
        </div>
        <!--  end card  -->
      </div>
      <!-- end col-md-12 -->
    </div>
    <!-- end row -->
  </div>
</div>
