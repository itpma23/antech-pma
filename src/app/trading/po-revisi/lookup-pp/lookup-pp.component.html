<div class="main-content" style="background-color: rgb(86, 86, 163);">
  <div class="container-fluid">

    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <!-- <div class="card-header card-header-icon" data-background-color="red">
            <i class="material-icons">person</i>
          </div> -->

          <div class="card-content">
            <h4 class="card-title">Daftar Data PP</h4>

            <div>
              <button type="button" data-dismiss="modal" (click)="onClose()" class="btn btn-primary btn-danger btn-sm ">
                Tutup</button>
                <button type="button" data-dismiss="modal" (click)="addPP()" class="btn btn-primary btn-info btn-sm ">
                  Tambahkan PP Terpilih</button>

            </div>

            <div class="content table-responsive">
              <table id="mytable" [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" datatable
                class="table table-striped table-no-bordered table-hover" cellspacing="0" width="100%"
                style="width:100%">

                <thead>
                  <tr>
                    <th>Lokasi</th>
                    <th>No PP</th>
                    <th>Kode Item</th>
                    <th>Nama Item</th>
                    <th>Satuan</th>
                    <th>Qty PP</th>
                    <th>Qty Sudah PO</th>
                    <th>Qty Blm PO</th>
                    <th><input type="checkbox" [(ngModel)]="isChecked" name="ppcheck" (click)="checkuncheckall()"> Pilih
                    </th>
                    <!-- <th></th> -->
                </thead>
                <tbody *ngIf="PrcPp?.length != 0">
                  <tr *ngFor="let p of PrcPp; index as i">
                    <td>{{p.lokasi}}</td>
                    <td>{{p.no_pp}}</td>
                    <td>{{p.kode_item}}</td>
                    <td>{{p.nama_item}}</td>
                    <td>{{p.uom}}</td>
                    <td>{{p.qty}}</td>
                    <td>{{p.qty_sudah_po}}</td>
                    <td>{{p.qty_belum_po}}</td>
                    <td>
                      <input type="checkbox" [(ngModel)]="p.isSelected" name="id" value="{{p.id}}"
                        (change)="isAllSelected()" >
                    </td>
                    <!-- <td class="text-right">

                      <button (click)="addItem(p)" class="btn btn-info btn-round btn-fab btn-fab-mini">
                        <i class="material-icons">add</i>
                      </button>

                    </td> -->
                  </tr>
                </tbody>
                <tfoot *ngIf="PrcPp?.length == 0" class="tfoot_dt">

                </tfoot>
              </table>
            </div>
            <!-- end content-->
          </div>
          <!--  end card  -->
        </div>
        <!-- end col-md-12 -->
      </div>
      <!-- end row -->
    </div>
  </div>
