<div class="main-content">
  <div class="container-fluid">

    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-header card-header-icon" data-background-color="red">
            <i class="material-icons">list</i>
          </div>

          <div class="card-content">
            <h4 class="card-title">Menu Acces</h4>

            <div class="nav-container">
              <ul class="">

                <li routerLinkActive="active" *ngFor="let menu of menuData">
                  <input type="checkbox" [(ngModel)]="menu['selected']" (change)="changeSelected();">
                  <a data-toggle="collapse" href="#{{menu.id}}-menu">
                      {{menu.name}}
                      <b class="caret"></b>
                  </a>

                  <div class="collapse" id="{{menu.id}}-menu">

                    <ul class="">
                      <li routerLinkActive="active" *ngFor="let submenu of menu.children">
                        <input type="checkbox" [(ngModel)]="submenu['selected']" >
                        <a
                          *ngIf="(!submenu.hasOwnProperty('children') || submenu.children.length <= 0)">
                          <span class="sidebar-normal">&nbsp;&nbsp;{{submenu.name}}</span>
                        </a>
                        <a data-toggle="collapse" href="#{{submenu.id}}-menu"
                          *ngIf="(submenu.hasOwnProperty('children') && submenu.children.length > 0)">
                          &nbsp;&nbsp;{{submenu.name}}
                            <b class="caret"></b>
                            </a>
                        <div class="collapse" id={{submenu.id}}-menu
                          *ngIf="(submenu.hasOwnProperty('children') && submenu.children.length > 0)">
                          <ul class="">
                            <li routerLinkActive="active" *ngFor="let submenu2 of submenu.children">
                              <input type="checkbox" [(ngModel)]="submenu2['selected']" (change)="changeSelected();">
                              <a
                                *ngIf="(!submenu2.hasOwnProperty('children') || submenu2.children.length <= 0)">
                                <span class="sidebar-normal">&nbsp;&nbsp;{{submenu2.name}}</span>

                              </a>
                              <a data-toggle="collapse" href="#{{submenu2.id}}"
                                *ngIf="(submenu2.hasOwnProperty('children') && submenu2.children.length > 0)">
                                &nbsp;&nbsp;{{submenu2.name}}
                                  <b class="caret"></b>

                              </a>
                              <div class="collapse" id={{submenu2.id}}
                                *ngIf="(submenu2.hasOwnProperty('children') && submenu2.children.length > 0)">

                              </div>
                            </li>
                          </ul>

                        </div>
                      </li>

                    </ul>
                  </div>
                </li>
              </ul>
            </div>
