            <div class="nav-container">
              <ul class="">

                <li routerLinkActive="active" *ngFor="let menu of menuData">
                  <a data-toggle="collapse" href="#{{menu.id}}-menu">
                    {{menu.text}}
                    <b class="caret"></b>
                  </a>
                  <a href="#" onclick="event.preventDefault()" (click)="addChild(menu.id)"
                    class="btn btn-simple btn-warning btn-icon"><i class="material-icons">add</i></a>
                  <a href="#" onclick="event.preventDefault()" (click)="edit(menu.id)"
                    class="btn btn-simple btn-warning btn-icon"><i class="material-icons">edit</i></a>
                  <a href="#" onclick="event.preventDefault()" (click)="delete(menu.id)"
                    class="btn btn-simple btn-danger btn-icon"><i class="material-icons">close</i></a>


                  <div class="collapse" id="{{menu.id}}-menu">

                    <ul class="">
                      <li routerLinkActive="active" *ngFor="let submenu of menu.children">
                        <a *ngIf="(!submenu.hasOwnProperty('children') || submenu.children.length <= 0)">

                          <span class="sidebar-normal">&nbsp;&nbsp;{{submenu.text}}</span>


                        </a>
                        <a data-toggle="collapse" href="#{{submenu.id}}-menu"
                          *ngIf="(submenu.hasOwnProperty('children') && submenu.children.length > 0)">


                          &nbsp;&nbsp;{{submenu.text}}
                          <b class="caret"></b>


                        </a>
                        <a href="#" onclick="event.preventDefault()" (click)="addChild(submenu.id)"
                          class="btn btn-simple btn-warning btn-icon"><i class="material-icons">add</i></a>
                        <a href="#" onclick="event.preventDefault()" (click)="edit(submenu.id)"
                          class="btn btn-simple btn-warning btn-icon"><i class="material-icons">edit</i></a>
                        <a href="#" onclick="event.preventDefault()" (click)="delete(submenu.id)"
                          class="btn btn-simple btn-danger btn-icon"><i class="material-icons">close</i></a>

                        <div class="collapse" id={{submenu.id}}-menu
                          *ngIf="(submenu.hasOwnProperty('children') && submenu.children.length > 0)">
                          <ul class="">
                            <li routerLinkActive="active" *ngFor="let submenu2 of submenu.children">
                              <a *ngIf="(!submenu2.hasOwnProperty('children') || submenu2.children.length <= 0)">
                                <span class="sidebar-normal">&nbsp;&nbsp;{{submenu2.text}}</span>

                              </a>
                              <a data-toggle="collapse" href="#{{submenu2.id}}"
                                *ngIf="(submenu2.hasOwnProperty('children') && submenu2.children.length > 0)">

                                &nbsp;&nbsp;{{submenu2.text}}
                                <b class="caret"></b>

                              </a>
                              <a href="#" onclick="event.preventDefault()" (click)="addChild(submenu2.id)"
                                class="btn btn-simple btn-warning btn-icon"><i class="material-icons">add</i></a>
                              <a href="#" onclick="event.preventDefault()" (click)="edit(submenu2.id)"
                                class="btn btn-simple btn-warning btn-icon"><i class="material-icons">edit</i></a>
                              <a href="#" onclick="event.preventDefault()" (click)="delete(submenu2.id)"
                                class="btn btn-simple btn-danger btn-icon"><i class="material-icons">close</i></a>

                              <div class="collapse" id={{submenu2.id}}
                                *ngIf="(submenu2.hasOwnProperty('children') && submenu2.children.length > 0)">

                              </div>
                            </li>
                          </ul>

                        </div>
                      </li>

                    </ul>
                  </div>
                </li>
              </ul>
            </div>
