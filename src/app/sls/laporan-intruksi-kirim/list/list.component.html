<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <!-- <div class="col-md-8 col-md-offset-2"> -->
      <!-- <h3 class="title text-center">Kelas Mapel</h3> -->
      <!-- <br /> -->
      <div class="col-md-12">
        <div class="card">
          <div class="card-header">
            <h4 class="card-title">Laporan -
              <small class="category">Intruksi Kirim</small>
            </h4>
          </div>
          <div class="card-content">
            <div class="row">
              <div class="col-md-2">
                <ul class="nav nav-pills nav-pills-icons nav-pills-warning nav-stacked" role="tablist">



                  <li class="active">
                    <a href="#laporan_ip" role="tab" data-toggle="tab">
                      <i class="material-icons">list</i> Rincian Intruksi Pengiriman
                    </a>
                  </li>
                  <li class="">
                    <a href="#laporan_ip_monitoring" role="tab" data-toggle="tab">
                      <i class="material-icons">list</i> Monitoring Intruksi Pengiriman
                    </a>
                  </li>

                </ul>
              </div>
              <div class="col-md-8">
                <div class="tab-content">

                  <div class="tab-pane active  " id="laporan_ip">
                    <!-- <form [formGroup]="penerimaanTbsRincianExtForm" (ngSubmit)="reportPenerimaanTbsRincianExt()"> -->
                    <form [formGroup]="laporanRincian">

                      <div class="card">
                        <div class="card-header">
                          <h4 class="card-title">Instruksi Pengiriman</h4>
                        </div>
                        <div class="card-content">


                          <!-- <div class="form-group label-floating">
                            <label class="control-label">Lokasi</label>
                            <l-select2 [data]="dataSelectOrganisasi" formControlName="lokasi" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'50%'}">
                            </l-select2>
                          </div> -->
                          <div class="form-group label-floating">
                            <label class="control-label">Customer</label>
                            <l-select2 [data]="dataSelectCustomer" formControlName="customer" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'50%'}">
                            </l-select2>
                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>dari Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_mulai">
                            </mat-form-field>
                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>s/d Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_akhir">
                            </mat-form-field>
                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>No Kontrak</mat-label>
                              <input matInput formControlName="no_kontrak"  type="text">
                            </mat-form-field>

                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>No IP</mat-label>
                              <input matInput formControlName="no_ip"  type="text">
                            </mat-form-field>

                          </div>
                          <label id="example-radio-group-label">Format Laporan</label>
                          <mat-radio-group formControlName="format_laporan" aria-labelledby="example-radio-group-label"
                            class="example-radio-group">
                            <mat-radio-button value="view">View </mat-radio-button>
                            <mat-radio-button value="xls">XLS</mat-radio-button>
                            <mat-radio-button value="pdf">PDF</mat-radio-button>
                          </mat-radio-group>

                          <!-- <div class="form-group">
                            <button type="submit" class="btn btn-primary btn-sm btn-rose">Tampilkan</button>
                          </div> -->
                          <div class="form-group">
                            <button class="btn btn-primary btn-sm btn-rose"
                            (click)="reportRincian()">Tampilkan</button>
                            <!-- <button type="button" class="btn btn-primary btn-sm btn-rose"
                              (click)="reportPoRincian('excel')">Excel</button> -->
                          </div>

                        </div>
                      </div>
                    </form>
                  </div>

                  <div class="tab-pane   " id="laporan_ip_monitoring">
                    <!-- <form [formGroup]="penerimaanTbsRincianExtForm" (ngSubmit)="reportPenerimaanTbsRincianExt()"> -->
                    <form [formGroup]="laporanMonitoring">

                      <div class="card">
                        <div class="card-header">
                          <h4 class="card-title">Monitoring Intruksi Pengiriman</h4>
                        </div>
                        <div class="card-content">


                          <div class="form-group label-floating">
                            <label class="control-label">Customer</label>
                            <l-select2 [data]="dataSelectCustomer" formControlName="customer" [options]="{ placeholder: 'Semua',
                        allowClear: true,width:'50%'}">
                            </l-select2>
                          </div>
                          <!-- <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>dari Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_mulai">
                            </mat-form-field>
                          </div> -->
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>Tanggal Mulai</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_mulai">
                            </mat-form-field>
                          </div>
                          <div class="example-full-width ">
                            <mat-form-field>
                              <mat-label>s/d Tanggal</mat-label>
                              <input type="text" matInput [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker
                                class="form-control" formControlName="tanggal_akhir">
                            </mat-form-field>
                          </div>
                          <label id="example-radio-group-label">Status</label>
                          <mat-radio-group formControlName="status" aria-labelledby="example-radio-group-label"
                            class="example-radio-group">
                            <mat-radio-button value="all">Semua </mat-radio-button>
                            <mat-radio-button value="on_progres">On Progres</mat-radio-button>
                            <mat-radio-button value="close">Close</mat-radio-button>
                          </mat-radio-group>
                          <label id="example-radio-group-label">Format Laporan</label>
                          <mat-radio-group formControlName="format_laporan" aria-labelledby="example-radio-group-label"
                            class="example-radio-group">
                            <mat-radio-button value="view">View </mat-radio-button>
                            <mat-radio-button value="xls">XLS</mat-radio-button>
                            <mat-radio-button value="pdf">PDF</mat-radio-button>
                          </mat-radio-group>

                          <!-- <div class="form-group">
                            <button type="submit" class="btn btn-primary btn-sm btn-rose">Tampilkan</button>
                          </div> -->
                          <div class="form-group">
                            <button class="btn btn-primary btn-sm btn-rose"
                              (click)="reportMonitoring()">Tampilkan</button>
                            <!-- <button type="button" class="btn btn-primary btn-sm btn-rose"
                              (click)="reportPoRincian('excel')">Excel</button> -->
                          </div>

                        </div>
                      </div>
                    </form>
                  </div>



                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- </div> -->
    </div>
  </div>
</div>
