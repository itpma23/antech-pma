<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <form [formGroup]="entryForm" (ngSubmit)="onSubmit()">
        <div class="col-md-12">
          <div class="card">
            <div class="card-header card-header-icon" data-background-color="rose">
              <i class="material-icons">list</i>
            </div>
            <div class="card-content">
              <h4 class="card-title">Approval Pengajuan Cuti</h4>
              <a href="#" *ngIf="HrmsPengajuanCuti.upload_file" onclick="event.preventDefault()" (click)="download(HrmsPengajuanCuti.id)"
              class="btn btn-sm btn-warning btn-icon " rel="tooltip" data-placement="bottom"
              title="Download File"><i class="material-icons">file_download</i></a>
              <br>
              <br>
              <!-- <p class="label label-success"> {{PrcPo.no_po}}</p> -->
              <!-- <div class="form-group label-floating">

                <label class="control-label">Diajukan Kepada</label>
                <l-select2 [data]="dataSelectKaryawan" formControlName="karyawan_id" [options]="{ placeholder: 'Pilih',
                allowClear: true}">
                </l-select2>
                <div *ngIf="isFormSubmitted && userControl.karyawan_id.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.karyawan_id.errors.required " class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>

              </div> -->
              <p class="card-title">Approval Pengajuan Cuti</p>
              <mat-radio-group formControlName="status_id" aria-labelledby="example-radio-group-label"
                class="example-radio-group" (change)="statusChange($event)">
                <mat-radio-button value="1">APPROVE </mat-radio-button>
                <mat-radio-button value="0">REJECTED</mat-radio-button>

              </mat-radio-group>
              <div class="example-full-width ">
                <mat-form-field>
                  <mat-label>Status</mat-label>
                  <input matInput formControlName="status" required readonly>
                </mat-form-field>
                <div *ngIf="isFormSubmitted && userControl.status.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.status.errors.required" class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              <div class="example-full-width ">
                <mat-form-field>
                  <mat-label>Catatan Approval</mat-label>
                  <input matInput formControlName="note_approve" required>
                </mat-form-field>
                <div *ngIf="isFormSubmitted && userControl.note_approve.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.note_approve.errors.required" class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              <div class="panel-group" id="accordion" role="tablist" aria-multiselectable="true">
                <div class="panel panel-default">
                  <div class="panel-heading" role="tab" id="headingOne">
                    <a role="button" data-toggle="collapse" data-parent="#accordion" href="#collapseOne"
                      aria-expanded="false" aria-controls="collapseOne">
                      <h4 class="panel-title">
                        Rincian Cuti
                        <i class="material-icons">keyboard_arrow_down</i>
                      </h4>
                    </a>
                  </div>
                  <div id="collapseOne" class="panel-collapse collapse" role="tabpanel" aria-labelledby="headingOne">
                    <div class="panel-body">
                      <p>Data Cuti</p>
                      <div style="display: flex;align-items: center;justify-content: center;">
                        <iframe width="800" height="500" src="" type="application/pdf"></iframe>
                      </div>

                    </div>
                  </div>
                </div>

              </div>

              <button type="button" class="btn btn-default" data-dismiss="modal" (click)="onClose()">Batal</button>
              <button *ngIf="status_id=='1'" type="submit" class="btn btn-fill btn-rose">Approve </button>
              <button *ngIf="status_id!='1'" type="button" class="btn btn-fill btn-danger" onclick="event.preventDefault()"
              (click)="reject()" >
                Reject/Tolak
              </button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
