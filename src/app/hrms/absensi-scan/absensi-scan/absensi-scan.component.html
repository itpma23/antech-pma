<div class="main-content">
  <div class="container-fluid">

    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-header card-header-icon" data-background-color="red">
            <i class="material-icons">event</i>
          </div>

          <div class="card-content">
            <h4 class="card-title">Absensi Scan</h4>
            <form [formGroup]="entryForm" (ngSubmit)="onSubmit()">

              <div class="toolbar">
                <div class="form-group label-floating myClass ">
                  <label class="control-label ">Tgl</label>
                  <input type="text" [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker class="form-control"
                    formControlName="tgl">
                  <div class="form-control-position"><i class="ft-calendar"></i></div>
                  <div *ngIf="isFormSubmitted && userControl.tgl.errors" class="invalid-feedback">
                    <small [hidden]="!userControl.tgl.errors.required" class="text-danger">
                      Tidak boleh kosong!
                    </small>
                  </div>
                </div>
                <!-- <div class="form-group label-floating">
                  <label class="control-label">Kelas</label>

                  <l-select2 [data]="dataSelectKelas" (valueChange)="KelasChange($event)" [options]="{ width:'50%',placeholder: 'Pilih',
                allowClear: false}" formControlName="kelas_id">
                  </l-select2>
                  <div *ngIf="isFormSubmitted && userControl.kelas_id.errors" class="invalid-feedback">
                    <small [hidden]="!userControl.kelas_id.errors.required " class="text-danger">
                      Tidak boleh kosong!
                    </small>
                  </div>
                </div> -->
                <!-- {{Kelas.text}} -->
              </div>
              <button type="submit" class="btn btn-fill btn-rose">Tampilkan</button>
              <!-- <button type="button" class="btn btn-fill btn-rose" (click)="exportXLS()">XLS Rekap Per bulan</button> -->
            </form>

            <div class="">
              <table id="mytable" [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" datatable
                class="table table-striped table-no-bordered table-hover" cellspacing="0" width="100%"
                style="width:100%">

                <thead>
                  <tr>
                    <th width="10%">No</th>
                    <th>Nama</th>
                    <th width="10%" >Masuk</th>
                   <th width="10%"> Keluar</th>
                </thead>
                <tbody *ngIf="absensi?.length != 0">
                  <tr *ngFor="let p of absensi; index as i">

                    <td>{{i+1}}</td>
                    <td>
                      <!-- <strong>{{p.nama}}</strong><small>({{p.nis}})</small> -->
                      <div class="panel panel-default">
                        <div class="panel-heading" role="tab" id="headingOne">
                          <a role="button" data-toggle="collapse" data-parent="#accordion" href="#{{p.karyawan_id}}"
                            aria-expanded="false" aria-controls="collapseOne">
                            <h4 class="panel-title">
                              <strong>{{p.nama}}</strong><small>({{p.nip}})</small>
                               <!-- <span
                                class="label label-info pull-right">{{(p.Status=='2')?'Izin: ':'Hadir: '}}{{p.Time}}
                              </span> -->
                              <i class="material-icons">keyboard_arrow_down</i>
                            </h4>
                          </a>
                        </div>
                        <div id="{{p.karyawan_id}}" class="panel-collapse collapse" role="tabpanel"
                          aria-labelledby="headingOne">
                          <div class="panel-body">
                            <div class="col-md-6">
                              <div class="card">
                                <div class="card-content">
                                  <p>{{p.location_masuk}}</p>
                                  <div class="fileinput-new thumbnail" *ngIf="p.file_masuk!=null">
                                  <img src="{{PATH_URL}}/{{pathName}}/userfiles/absensiQRCode/{{p.file_masuk}}">
                                </div>
                                </div>
                              </div>
                            </div>
                            <div class="col-md-6">
                              <div class="card">
                                <div class="card-content">
                                  <p>{{p.location_keluar}}</p>
                                  <div class="fileinput-new thumbnail" *ngIf="p.file_keluar!=null">
                                  <img src="{{PATH_URL}}/{{pathName}}/userfiles/absensiQRCode/{{p.file_keluar}}">
                                </div>
                                </div>
                              </div>
                            </div>
                            <!-- <div class="col-md-8">
                              <div class="card">
                                <div class="card-content">
                                  <p>Tanggal:{{p.Date}} &nbsp;&nbsp;{{p.Time}}</p>
                                  <p>Status :{{(p.Status=='2')?'Izin':'Hadir'}}</p>
                                  <p>Kelas :{{p.kelas}} </p>
                                </div>
                              </div>
                            </div> -->
                          </div>
                        </div>
                      </div>

                    </td>

                    <td>
                    <span class="label label-info" >{{p.jam_masuk}}</span>
                    </td>
                    <td>
                      <span class="label label-danger" >{{p.jam_keluar}}</span>
                      </td>
                  <!-- <td class="text-right">


                  </td> -->
                  </tr>
                </tbody>
                <tfoot *ngIf="absensi?.length == 0" class="tfoot_dt">

                </tfoot>
              </table>
            </div>
          </div>
          <!-- end content-->
        </div>
        <!--  end card  -->
      </div>
      <!-- end col-md-12 -->
    </div>
    <!-- end row -->
  </div>
</div>
