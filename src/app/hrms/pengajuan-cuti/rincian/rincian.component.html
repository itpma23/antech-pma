<div class="main-content">
  <div class="container-fluid">
    <div class="row">

      <div class="col-md-12">
        <div class="card">
          <div class="card-header card-header-icon" data-background-color="rose">
            <i class="material-icons">list</i>
          </div>
          <div class="card-content container-fluid">
            <h4 class="card-title">Info Rincian Cuti</h4>
            <!-- <div class="card-content">
              <div class="row">
                <div class="form-group label-floating col-md-6">
                  <label class="control-label">Nama Karyawan</label>
                  <input type="text" class="form-control" readonly>
                </div>
                <div class="form-group label-floating col-md-6">
                  <label class="control-label">Jumlah Cuti</label>
                  <input type="text" class="form-control" readonly>
                </div>
              </div>
            </div> -->
            <div class="card-content">
              <div class="table-responsive">
                <table class="table">
                  <thead>
                    <tr>
                      <!-- <th>Nama</th> -->
                      <th class="text-left">Tanggal</th>
                      <th class="text-left">Ket</th>
                      <th class="text-right">Jumlah</th>


                    </tr>
                  </thead>
                  <tbody *ngIf="Rincian?.length != 0">
                    <tr *ngFor="let p of Rincian">
                      <!-- <td>{{p.nama}}</td> -->
                      <td>{{p.tanggal}}</td>
                      <td>{{p.ket}}</td>
                      <td class="text-right">{{p.jumlah}}</td>


                    </tr>
                  </tbody>
                  <tfoot>
                    <tr>
                      <!-- <th>Nama</th> -->
                      <th colspan="2"></th>
                      <th class="text-right"><b>{{getJumlah()}}</b></th>

                    </tr>
                  </tfoot>

                </table>
              </div>
            </div>

            <button type="button" class="btn btn-default" data-dismiss="modal" (click)="onClose()">Tutup</button>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>
