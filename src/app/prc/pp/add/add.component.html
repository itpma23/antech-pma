<div class="main-content">
  <div class="container-fluid">
    <div class="row">
      <form [formGroup]="entryForm" (ngSubmit)="onSubmit()">
        <div class="col-md-12">
          <div class="card">
            <div class="card-header card-header-icon" data-background-color="rose">
              <i class="material-icons">person</i>
            </div>
            <div class="card-content">
              <h4 class="card-title">Permintaan Pembelian</h4>

              <div class="form-group label-floating">
                <label class="control-label">Lokasi</label>
                <l-select2 [data]="dataSelectLokasi" formControlName="lokasi_id" [options]="{ placeholder: 'Pilih',
                allowClear: true}">
                </l-select2>
                <div *ngIf="isFormSubmitted && userControl.lokasi_id.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.lokasi_id.errors.required " class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              <div class="form-group label-floating">
                <label class="control-label">tanggal</label>
                <input type="text" [bsConfig]="datepickerConfig" #dp="bsDatepicker" bsDatepicker class="form-control"
                  formControlName="tanggal">
                <div class="form-control-position"><i class="ft-calendar"></i></div>
                <div *ngIf="isFormSubmitted && userControl.tanggal.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.tanggal.errors.required" class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              <div class="example-full-width ">
                <mat-form-field>
                  <mat-label>No PP</mat-label>
                  <input matInput formControlName="no_pp" required readonly>
                </mat-form-field>
                <div *ngIf="isFormSubmitted && userControl.no_pp.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.no_pp.errors.required" class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>
              <div class="example-full-width ">
                <mat-form-field>
                  <mat-label>Catatan</mat-label>
                  <input matInput formControlName="catatan" required>
                </mat-form-field>
                <div *ngIf="isFormSubmitted && userControl.catatan.errors" class="invalid-feedback">
                  <small [hidden]="!userControl.catatan.errors.required" class="text-danger">
                    Tidak boleh kosong!
                  </small>
                </div>
              </div>






              <div formArrayName="details" style="overflow-x: auto; width: 100%;">
                <table id="mytable" class="table table-striped table-no-bordered table-hover" cellspacing="0"
                  width="100%" style="width:100%">
                  <thead>
                    <tr>

                      <th style="width: 30%;">Item</th>
                      <th>UOM</th>
                      <th>Qty</th>
                      <th>Keterangan</th>

                      <th></th>
                    </tr>
                  </thead>
                  <tbody>

                    <tr [formGroupName]="i" *ngFor="let blok of details.controls; let i=index; let odd=odd;">
                      <td>
                        <l-select2 [data]="dataSelectItem" formControlName="item" [options]="{ placeholder: 'Pilih',
                        allowClear: true}" (ngModelChange)="getUOM(blok)">
                        </l-select2>
                      </td>
                      <td> <input type="text" formControlName="uom" style="text-align: center;" class="form-control" readonly></td>
                      <td> <input formControlName="qty" class="form-control" (change)="addValueChange(blok)"></td>
                      <td> <textarea type="text" formControlName="ket" style="text-align: left;" class="form-control"></textarea></td>
                      <td>
                        <button onclick="event.preventDefault()" (click)="cekStok(blok)" class="btn btn-info btn-round btn-fab btn-fab-mini">
                          <i class="material-icons">info</i></button>
                        <button (click)="removeBlok(blok)" class="btn btn-danger btn-round btn-fab btn-fab-mini">
                        <i class="material-icons">close</i></button>
                      </td>
                    </tr>
                  </tbody>
                  <button onclick="event.preventDefault()" (click)="addBlok()" class="btn btn-info btn-round btn-fab btn-fab-mini">
                    <i class="material-icons">add</i>
                  </button>
                </table>
              </div>




              <button type="button" class="btn btn-default" data-dismiss="modal" (click)="onClose()">Batal</button>
              <button type="submit" class="btn btn-fill btn-rose">Simpan</button>

          </div>
        </div>
    </div>
    </form>
  </div>
</div>
</div>
