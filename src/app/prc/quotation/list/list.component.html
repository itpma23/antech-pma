<div class="main-content">
  <div class="container-fluid">

    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-header card-header-icon" data-background-color="red">
            <i class="material-icons">list</i>
          </div>

          <div class="card-content">
            <h4 class="card-title">Quotation</h4>

            <div class="toolbar">


              <div class="btn-group" *ngIf="accessButton?.print_==true">
                <button type="button" (click)="exportFiles('csv')"
                  class="btn btn-round btn-info btn-sm btn-rose">csv</button>
                <button type="button" (click)="exportFiles('xlsx')"
                  class="btn btn-round btn-info btn-sm btn-rose">excel</button>
                <!-- <button type="button" class="btn btn-round btn-info">3</button>  -->
                <button type="button" (click)="exportFiles('pdf')"
                  class="btn btn-round btn-info btn-sm btn-rose">pdf</button>
              </div>
              <button type="button" (click)="add();"
              *ngIf="accessButton?.new_==true" class="btn btn-primary btn-info btn-sm btn pull-right btn-rose">Tambah Quotation</button>

            </div>
            <div >
              <table id="mytable" [dtOptions]="dtOptions" [dtTrigger]="dtTrigger" datatable
                class="table table-striped table-no-bordered table-hover" cellspacing="0" width="100%"
                style="width:100%">

                <thead>
                  <tr>
                    <th>ID</th>
                    <th>No Quotation</th>
                    <th>No referensi</th>
                    <th>Catatan</th>
                     <th></th>
                  </tr>
                </thead>
                <tbody *ngIf="quotation?.length != 0">
                  <tr *ngFor="let p of quotation; index as i">
                    <td>
                      {{p.no_quotation}}
                    </td>

                    <td>
                      {{p.no_referensi}}
                    </td>
                    <td>
                      {{p.catatan}}
                    </td>

                    <td class="text-right">

                      <a href="#" onclick="event.preventDefault()" (click)="detail(p.id)"
                        class="btn btn-simple btn-warning btn-icon " rel="tooltip" data-placement="bottom"
                        title="View"><i class="material-icons">visibility</i></a>
                      <a href="#" onclick="event.preventDefault()" (click)="edit(p.id)"
                      *ngIf="accessButton?.edit_==true" class="btn btn-simple btn-warning btn-icon edit" rel="tooltip" data-placement="bottom"
                        title="edit"><i class="material-icons">edit</i></a>
                      <a href="#" onclick="event.preventDefault()" (click)="delete(p.id)"
                      *ngIf="accessButton?.delete_==true" class="btn btn-simple btn-danger btn-icon remove" rel="tooltip" data-placement="bottom"
                        title="Hapus"><i class="material-icons">close</i></a>
                    </td>
                  </tr>
                </tbody>
                <tfoot *ngIf="quotation?.length == 0" class="tfoot_dt">

                </tfoot>
              </table>
            </div>
          </div>
          <!-- end content-->
        </div>
        <!--  end card  -->
      </div>
      <!-- end col-md-12 -->
    </div>
    <!-- end row -->
  </div>
</div>
